<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kmarkov563</title>
<style>
  :root{ color-scheme: light dark; }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#0f1115; color:#e8eaed;
  }
  @media (prefers-color-scheme: light){
    body{ background:#f6f7f9; color:#1a1c20; }
    .card{ background:#fff; box-shadow:0 8px 30px rgba(0,0,0,.08); }
  }
  .card{
    width:min(480px,92vw); padding:48px 40px; border-radius:18px;
    background:#171a21; text-align:center;
  }
  h1{ margin:0 0 6px; font-size:28px; letter-spacing:-.02em; }
  p.sub{ margin:0 0 32px; opacity:.6; font-size:15px; }
  a.btn{
    display:inline-block; padding:16px 32px; border-radius:12px;
    background:#3b82f6; color:#fff; text-decoration:none;
    font-size:17px; font-weight:600;
    transition:background .15s ease, transform .05s ease;
  }
  a.btn:hover{ background:#2f6fe0; }
  a.btn:active{ transform:translateY(1px); }
</style>
</head>
<body>
  <main class="card">
    <h1>kmarkov563</h1>
    <p class="sub">Личные проекты</p>
    <a class="btn" href="https://kmarkov563.github.io/sport/">🏋️ Открыть Sport BB</a>
  </main>
</body>
</html>
